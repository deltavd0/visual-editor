<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>visualcode</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <h1>visualcode</h1>

    <p class="section-title">resources</p>

    <div class="tools">
      <div class="tool" data-shape="square"></div>
      <div class="tool circle" data-shape="circle"></div>
      <div class="tool triangle" data-shape="triangle"></div>
    </div>
  </aside>

  <main class="workspace">
    <div id="canvas"></div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
<script src="script.js"></script>
</body>
</html>
